front:
  text: 大阿彌陀佛經序大藏經中有十餘經言阿彌陀佛濟度眾生其間四經本為一種譯者不同故有四名一名無量清淨平等覺經乃後漢月支三藏支婁加讖譯二曰無量壽經乃曹魏康僧鎧譯三曰阿彌陀過度人道經乃吳月支支謙譯四曰無量壽莊嚴經乃本朝西天三藏法賢譯其大略雖同然其中甚有差互若不觀省者又其文或失於太繁而使人厭觀或失於太嚴而喪其本真或其文適中而其意則失之由是釋迦文佛所以說經阿彌陀佛所以度人之旨紊而無序欝而不章予深惜之故熟讀而精考敘為一經蓋欲復其本也其校正之法若言一事抂此本為安彼本為杌隉則取其安者或此本為要彼本為泛濫則取其要者或此本為近彼本為迂則取其近者或彼本有之而此本闕則取其所有或彼本彰明而此本隱晦則取其明者大概乃取其所優去其所劣又有其文碎雜而失統錯亂而不倫者則用其意以修其辭刪其重以暢其義其或可疑者則闕焉而不敢取若此之類皆欲訂正聖言發明本旨使不惑於四種之異而知其指歸也又各從其事類析為五十六分欲觀者易見而喜於讀誦庶幾流傳之廣而一切眾生皆受濟度也予每校正必禱於觀音菩薩求冥助以開悟識性使無舛誤始末三年而後畢既畢乃拜而自喜目之曰大阿彌陀經蓋佛與舍利弗說者亦阿彌陀經彼則其文少故此言大以別之然佛說經非若吾聖人所說也吾聖人所說或深其文而叢其意使人索之而愈見其多或簡其文而晦其意使人思而後得佛則不然必欲詳陳曲布使人人可曉雖至愚下者亦知其意焉然而有辭直而意愈深者經所謂須信佛語深是也切不可以輕其辭而忽其意紹興壬午秋國學進士龍舒王日休謹序禮祝儀式誦淨口業真言唵修利修利摩訶修利修修利娑婆訶次誦五淨真言唵尾鼠提娑婆訶淨身器神呪唵秫殿都戌陀那耶娑婆訶次向西頂禮祝云弟子某甲謹為盡虛空界一切眾生歸依盡虛空界一切諸佛一切正法一切聖僧西方極樂世界阿彌陀佛觀世音菩薩大勢至菩薩一切菩薩聲聞諸上善人某甲今為盡虛空界一切眾生持誦大阿彌陀經及讚佛懺罪迴向發願願如此等眾生各各自誦經讚佛懺罪迴向發願願盡拔濟生於極樂世界乃念大慈菩薩讚佛懺罪迴向發願偈云十方三世佛阿彌陀第一九品度眾生威德無窮極我今大歸依懺悔三業罪凡有諸善福至心用迴向願同念佛人盡生極樂國見佛了生死如佛度一切如為薦亡或禳災或保安則隨意祝願不須如前祈禱亦須誦真言先歸依三寶及西方四聖然後祝願若為自身往生則宜一一如前其功德甚大矣
